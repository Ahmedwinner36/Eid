<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Celebration</title>
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #0a1a2a, #000);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
  }

  /* Crescent moon */
  .moon {
    width: 100px;
    height: 100px;
    background: #ffeb33; /* yellow moon */
    border-radius: 50%;
    position: absolute;
    top: 50px;
    right: 50px;
    box-shadow: -25px 0 0 #0a1a2a; /* creates crescent shape */
    z-index: 1;
  }

  /* Stars */
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.2; }
    50% { opacity: 1; }
    100% { opacity: 0.2; }
  }

  h1 {
    font-size: 3em;
    color: #ffd700;
    margin-bottom: 20px;
    text-shadow: 2px 2px 8px #ff7f50;
    animation: bounce 2s infinite;
    z-index: 2;
  }

  @keyframes bounce {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
  }

  input {
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 2px solid #ffd700;
    text-align: center;
    margin-right: 10px;
    z-index: 2;
    position: relative;
  }

  button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background-color: #ffd700;
    color: #0a1a2a;
    cursor: pointer;
    transition: transform 0.2s;
    z-index: 2;
    position: relative;
  }

  button:hover{ transform: scale(1.1); }

  #greeting {
    margin-top: 30px;
    font-size: 2em;
    color: #ff7f50;
    text-shadow: 1px 1px 5px #ffd700;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 1s ease, transform 1s ease;
    z-index: 2;
  }

  #greeting.show {
    opacity: 1;
    transform: scale(1);
  }

  .lantern {
    position: absolute;
    width: 30px;
    height: 50px;
    background: linear-gradient(to bottom, #ff7f50, #ffd700);
    border-radius: 10px 10px 15px 15px;
    box-shadow: 0 0 8px #ffdd33;
    opacity: 0;
    transform: translateY(100px) scale(0.5);
    transition: opacity 1s ease, transform 2s ease;
    z-index: 1;
  }

  .lantern-top {
    position: absolute;
    top: -10px;
    left: 5px;
    width: 20px;
    height: 10px;
    background: #ff7f50;
    border-radius: 10px 10px 0 0;
  }

  .lantern.show {
    opacity: 1;
    transform: translateY(-150px) scale(1);
  }

</style>
</head>
<body>

<div class="moon"></div>

<h1>Eid Mubarak!</h1>

<input type="text" id="nameInput" placeholder="Enter your name">
<button onclick="showGreeting()">Greet Me</button>

<div id="greeting"></div>

<script>
  const body=document.body;

  // Stars
  for(let i=0;i<100;i++){
    const star=document.createElement('div');
    star.classList.add('star');
    star.style.top=Math.random()*window.innerHeight+'px';
    star.style.left=Math.random()*window.innerWidth+'px';
    star.style.width=Math.random()*3+1+'px';
    star.style.height=star.style.width;
    star.style.animationDuration=(1+Math.random()*2)+'s';
    body.appendChild(star);
  }

  // Lanterns
  const lanterns=[];
  for(let i=0;i<5;i++){
    const lantern=document.createElement('div');
    lantern.classList.add('lantern');
    const top=document.createElement('div');
    top.classList.add('lantern-top');
    lantern.appendChild(top);
    lantern.style.left=(50+i*120)+'px';
    body.appendChild(lantern);
    lanterns.push(lantern);
  }

  function showGreeting(){
    const name=document.getElementById('nameInput').value.trim();
    const greetingDiv=document.getElementById('greeting');
    if(name){
      greetingDiv.innerText=`Eid Mubarak, ${name}!`;
      greetingDiv.classList.add('show');
      lanterns.forEach((lantern,index)=>{
        setTimeout(()=>{lantern.classList.add('show');},index*300);
      });
    }else{
      greetingDiv.innerText="Please enter your name!";
      greetingDiv.classList.remove('show');
      lanterns.forEach(l=>l.classList.remove('show'));
    }
  }
</script>

</body>
</html>
